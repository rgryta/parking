<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Garage Reservations</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gradient-to-br from-slate-100 to-blue-50 flex items-center justify-center" style="min-height:100vh">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5 3h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 10h2.5M13.5 10H16M7 14h10M9 7h6"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-slate-800">Garage Parking</h1>
      <p class="text-slate-500 mt-1">Reserve your parking space</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
      <form class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Your name</label>
          <input type="text" placeholder="e.g. Jan Kowalski" value="Jan Kowalski"
            class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-slate-800 placeholder-slate-400 text-sm"/>
          <p class="mt-1 text-xs text-slate-400">Used to label your reservations</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input type="password" value="••••••••••"
            class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-slate-800 text-sm"/>
        </div>
        <button type="button"
          class="w-full bg-blue-600 text-white font-semibold rounded-lg px-4 py-3 text-sm mt-2">
          Sign in
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-slate-400 mt-6">parking.gryta.eu</p>
  </div>

</body>
</html>
