<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Parking{% endblock %} — Garage Reservations</title>
  <link rel="stylesheet" href="/static/tailwind.css" />
  <style>
    .cell-taken { background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%); }
    .cell-mine  { background: linear-gradient(135deg, #bbf7d0 0%, #f0fdf4 100%); }
    @media (prefers-color-scheme: dark) {
      .cell-taken { background: linear-gradient(135deg, #1e3a5f 0%, #1e2d40 100%); }
      .cell-mine  { background: linear-gradient(135deg, #14532d 0%, #1a2e1a 100%); }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans">

  {% if user is defined and user %}
  <nav class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-14">
      <a href="/" class="flex items-center gap-2 font-semibold text-blue-600 dark:text-blue-400 text-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Parking
      </a>
      <div class="flex items-center gap-4">
        <span class="text-sm text-slate-500 dark:text-slate-400">
          Hi, <span class="font-medium text-slate-700 dark:text-slate-200">{{ user.sub }}</span>
          {% if user.admin %}<span class="ml-1 text-xs bg-amber-100 dark:bg-amber-900 text-amber-700 dark:text-amber-300 rounded px-1.5 py-0.5 font-semibold">admin</span>{% endif %}
        </span>
        {% if user.admin %}
        <a href="/admin" class="text-sm text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Admin</a>
        {% endif %}
        <form method="post" action="/logout">
          <button type="submit"
            class="text-sm bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 rounded-md px-3 py-1.5 transition-colors">
            Log out
          </button>
        </form>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
